<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURUSD Prediction Core</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f6; padding: 2rem; color: #333; }
        .container { max-width: 640px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem; }
        p.sub { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
        button { width: 100%; padding: 0.9rem; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background 0.3s; margin-top: 1rem; }
        button:hover:not(:disabled) { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: wait; }
        .spinner { display: none; margin: 1.5rem auto 0; width: 32px; height: 32px; border: 4px solid #ecf0f1; border-top-color: #3498db; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dashboard { margin-top: 1.5rem; display: none; }
        .dashboard.active { display: block; }
        .card { padding: 1rem; border-radius: 4px; margin-bottom: 0.75rem; border-left: 4px solid #95a5a6; background-color: #f4f6f6; }
        .card.up { border-left-color: #27ae60; background-color: #eafaf1; }
        .card.down { border-left-color: #e74c3c; background-color: #fdedec; }
        .card h3 { margin: 0 0 0.5rem 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.03em; color: #555; }
        .card .value { font-size: 1.15rem; font-weight: bold; }
        .card .sub-value { margin-top: 0.25rem; font-size: 0.95rem; }
        .meta { font-size: 0.8rem; color: #888; margin-top: 0.75rem; line-height: 1.4; }
        .error { background-color: #fdedec; border-left: 4px solid #e74c3c; color: #c0392b; padding: 1rem; border-radius: 4px; margin-top: 1.5rem; }
        button.secondary { background-color: #8e44ad; }
        button.secondary:hover:not(:disabled) { background-color: #7d3c98; }
        .retrain-status { display: none; margin-top: 1rem; padding: 0.9rem; border-radius: 4px; font-size: 0.9rem; border-left: 4px solid #8e44ad; background: #f5eefb; }
        .retrain-status.active { display: block; }
        .retrain-status.done { border-left-color: #27ae60; background: #eafaf1; }
        .retrain-status.failed { border-left-color: #e74c3c; background: #fdedec; }
        .retrain-status pre { margin: 0.5rem 0 0; font-size: 0.75rem; white-space: pre-wrap; max-height: 140px; overflow-y: auto; color: #555; background: rgba(0,0,0,0.03); padding: 0.5rem; border-radius: 3px; }
        .links { margin-top: 1rem; text-align: center; font-size: 0.85rem; }
        .links a { color: #2980b9; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EURUSD Directional Extrapolator</h1>
        <p class="sub">Fully autonomous — knows today's date itself, fetches live market data (MT5, falling back to Yahoo Finance), and runs both production models. No manual input, no date picker.</p>

        <button id="predictBtn" onclick="fetchAndPredict()">Fetch Live Market Data &amp; Predict Tomorrow</button>
        <div id="spinner" class="spinner"></div>

        <div id="dashboard" class="dashboard"></div>
        <div id="errorBox" class="error" style="display:none;"></div>

        <button id="retrainBtn" class="secondary" onclick="startRetrain()">🔁 Retrain Models (runs in background)</button>
        <div id="retrainStatus" class="retrain-status"></div>

        <div class="links"><a href="/history" target="_blank">📊 View prediction-vs-actual history →</a></div>
    </div>

    <script>
        const DATA_SOURCE_LABELS = {
            MT5: 'Live MT5 terminal session',
            yfinance: 'Live Yahoo Finance fetch',
            history_fallback: 'Historical fallback (no live source reachable)',
        };

        const MACRO_SOURCE_LABELS = {
            FRED_api: 'Live FRED API',
            FRED_public: 'Live FRED public endpoint',
            cache: 'Cached FRED snapshot',
            unavailable: 'Unavailable — defaulted to 0.0',
        };

        async function fetchAndPredict() {
            const btn = document.getElementById('predictBtn');
            const spinner = document.getElementById('spinner');
            const dashboard = document.getElementById('dashboard');
            const errorBox = document.getElementById('errorBox');

            btn.disabled = true;
            btn.textContent = 'Fetching Live Data & Predicting…';
            spinner.classList.add('active');
            dashboard.classList.remove('active');
            dashboard.innerHTML = '';
            errorBox.style.display = 'none';

            try {
                const response = await fetch('/api/predict', { method: 'POST' });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Unknown API error');
                }

                renderDashboard(data);
            } catch (err) {
                errorBox.textContent = `Error: ${err.message}`;
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch Live Market Data & Predict Tomorrow';
                spinner.classList.remove('active');
            }
        }

        function modelCard(title, pred) {
            const cls = pred.direction === 'UP' ? 'up' : 'down';
            const arrow = pred.direction === 'UP' ? '📈' : '📉';
            return `<div class="card ${cls}">
                <h3>${title}</h3>
                <div class="value">${pred.direction} ${arrow} &mdash; ${(pred.confidence * 100).toFixed(2)}% confidence</div>
                <div class="sub-value">Predicted return: ${pred.predicted_return_pct.toFixed(4)}%</div>
            </div>`;
        }

        function renderDashboard(data) {
            const dashboard = document.getElementById('dashboard');
            let html = '';
            const fmt = (v) => (typeof v === 'number' ? v.toFixed(5) : v);
            const bar = data.bar_used || {};
            const sourceLabel = DATA_SOURCE_LABELS[data.data_source] || data.data_source;
            const macroLabel = MACRO_SOURCE_LABELS[bar.macro_source] || bar.macro_source;
            const yieldDiff = typeof bar.yield_differential === 'number' ? bar.yield_differential.toFixed(3) : bar.yield_differential;

            // --- Today's Market State ---
            html += `<div class="card">
                <h3>Today's Market State &mdash; Data 'As Of' ${data.as_of_date}</h3>
                <div class="sub-value">${sourceLabel}</div>
                <div class="sub-value">O ${fmt(bar.open)} / H ${fmt(bar.high)} / L ${fmt(bar.low)} / C ${fmt(bar.close)} / Vol ${bar.tick_volume}</div>
                <div class="meta">US10Y&minus;DE10Y Yield Differential: ${yieldDiff} (${macroLabel})</div>
            </div>`;

            // --- Prediction for Next Period (Committee Consensus) ---
            if (data.consensus) {
                const c = data.consensus;
                const cls = c.direction === 'UP' ? 'up' : 'down';
                const arrow = c.direction === 'UP' ? '📈' : '📉';
                const agreement = c.agreement ? '✅ Models agree' : '⚠️ Models disagree — showing the higher-confidence call';
                html += `<div class="card ${cls}" style="border-left-width: 6px;">
                    <h3>Prediction for Next Period &mdash; Forecasting Date ${data.forecasting_date}</h3>
                    <div class="value">${c.direction} ${arrow} &mdash; ${(c.confidence * 100).toFixed(2)}% confidence</div>
                    <div class="sub-value">Averaged predicted return: ${c.predicted_return_pct.toFixed(4)}%</div>
                    <div class="meta">${agreement}</div>
                </div>`;
            }

            if (data.gbm) html += modelCard('GBM &mdash; Gradient Boosting', data.gbm);
            if (data.lstm) html += modelCard('Multi-Task LSTM', data.lstm);
            if (data.lstm_error) html += `<div class="meta">LSTM: ${data.lstm_error}</div>`;

            dashboard.innerHTML = html;
            dashboard.classList.add('active');
        }

        // ── Background retraining ──────────────────────────────────────────
        let retrainPoll = null;

        async function startRetrain() {
            const btn = document.getElementById('retrainBtn');
            const box = document.getElementById('retrainStatus');
            box.className = 'retrain-status active';
            box.innerHTML = 'Starting retraining…';

            try {
                const res = await fetch('/api/retrain', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Could not start retraining');
                btn.disabled = true;
                btn.textContent = '⏳ Retraining in progress…';
                if (retrainPoll) clearInterval(retrainPoll);
                retrainPoll = setInterval(pollRetrainStatus, 3000);
                pollRetrainStatus();
            } catch (err) {
                box.className = 'retrain-status active failed';
                box.innerHTML = `Error: ${err.message}`;
            }
        }

        async function pollRetrainStatus() {
            const btn = document.getElementById('retrainBtn');
            const box = document.getElementById('retrainStatus');
            try {
                const res = await fetch('/api/retrain/status');
                const s = await res.json();
                const mins = ((s.elapsed_seconds || 0) / 60).toFixed(1);
                const tail = s.log_tail ? `<pre>${s.log_tail.replace(/</g, '&lt;')}</pre>` : '';

                if (s.state === 'running') {
                    box.className = 'retrain-status active';
                    box.innerHTML = `⏳ Training… (${mins} min elapsed). This takes ~15–30 min; you can keep predicting meanwhile.${tail}`;
                } else if (s.state === 'completed') {
                    box.className = 'retrain-status active done';
                    box.innerHTML = `✅ Retraining complete in ${mins} min. New models loaded (models_ready=${s.models_ready}).${tail}`;
                    stopRetrainPolling();
                } else if (s.state === 'failed') {
                    box.className = 'retrain-status active failed';
                    box.innerHTML = `❌ Retraining failed (exit ${s.returncode}).${tail}`;
                    stopRetrainPolling();
                } else {
                    box.className = 'retrain-status active';
                    box.innerHTML = 'Idle.';
                    stopRetrainPolling();
                }
            } catch (err) {
                box.className = 'retrain-status active failed';
                box.innerHTML = `Status check failed: ${err.message}`;
                stopRetrainPolling();
            }
        }

        function stopRetrainPolling() {
            if (retrainPoll) { clearInterval(retrainPoll); retrainPoll = null; }
            const btn = document.getElementById('retrainBtn');
            btn.disabled = false;
            btn.textContent = '🔁 Retrain Models (runs in background)';
        }

        // If a retrain is already running (e.g. page reloaded), resume polling.
        window.addEventListener('load', async () => {
            try {
                const s = await (await fetch('/api/retrain/status')).json();
                if (s.state === 'running') {
                    document.getElementById('retrainBtn').disabled = true;
                    document.getElementById('retrainBtn').textContent = '⏳ Retraining in progress…';
                    retrainPoll = setInterval(pollRetrainStatus, 3000);
                    pollRetrainStatus();
                }
            } catch (e) { /* ignore */ }
        });
    </script>
</body>
</html>
