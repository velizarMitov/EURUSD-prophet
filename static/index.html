<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURUSD Prediction Core</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f6; padding: 2rem; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result { margin-top: 1.5rem; padding: 1rem; background-color: #e8f8f5; border-left: 4px solid #1abc9c; border-radius: 4px; display: none; }
        .error { background-color: #fdedec; border-left-color: #e74c3c; color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EURUSD Directional Extrapolator (Web API)</h1>
        <div class="form-group"><label>Open Price:</label><input type="number" id="open" value="1.1000" step="0.0001"></div>
        <div class="form-group"><label>High Price:</label><input type="number" id="high" value="1.1050" step="0.0001"></div>
        <div class="form-group"><label>Low Price:</label><input type="number" id="low" value="1.0950" step="0.0001"></div>
        <div class="form-group"><label>Close Price:</label><input type="number" id="close" value="1.1020" step="0.0001"></div>
        <div class="form-group"><label>Tick Volume:</label><input type="number" id="volume" value="85000"></div>
        <button onclick="predict()">Execute API Inference</button>
        <div id="resultBox" class="result"></div>
    </div>
    <script>
        async function predict() {
            const data = {
                open: parseFloat(document.getElementById('open').value),
                high: parseFloat(document.getElementById('high').value),
                low: parseFloat(document.getElementById('low').value),
                close: parseFloat(document.getElementById('close').value),
                tick_volume: parseFloat(document.getElementById('volume').value)
            };
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            box.innerText = "Querying model...";
            box.className = "result";
            
            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const resData = await response.json();
                
                if (response.ok) {
                    let rows = "";
                    if (resData.gbm) {
                        rows += `<strong>GBM</strong> &mdash; Direction: ${resData.gbm.direction} | Confidence: ${(resData.gbm.confidence * 100).toFixed(2)}% | Return: ${resData.gbm.predicted_return_pct.toFixed(4)}%<br/>`;
                    }
                    if (resData.lstm) {
                        rows += `<strong>LSTM</strong> &mdash; Direction: ${resData.lstm.direction} | Confidence: ${(resData.lstm.confidence * 100).toFixed(2)}% | Return: ${resData.lstm.predicted_return_pct.toFixed(4)}%<br/>`;
                    }
                    if (resData.lstm_error) {
                        rows += `<em>LSTM: ${resData.lstm_error}</em><br/>`;
                    }
                    box.innerHTML = rows || "No model produced a prediction.";
                } else {
                    box.className = "result error";
                    box.innerText = `API Error: ${resData.detail}`;
                }
            } catch (err) {
                box.className = "result error";
                box.innerText = `Network/Connection Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
